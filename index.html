<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFC Champions</title>

    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700&display=swap" rel="stylesheet">

    <!-- Esse index Edmilton eu criei pq o index original foi feito dentro das pages,
    ai pra poder encontra no git hub, criei essa intro como index,
    por isso o stytle e o script ta dentro do html. -->

    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Lato", sans-serif;
        }

        body{
            background: #000;
            height: 100vh;
            overflow: hidden;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bg-video{
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.08;
            z-index: -1;
        }

        .container{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px;

            animation: aparecer 1.5s ease forwards;
        }

        h1{
            color: #fff;
            font-size: 1.3rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 700;
        }

        span{
            color: #d1b420;
        }

        .logo{
            width: 350px;
            user-select: none;
        }

        .animar{
            animation: introLogo 5s forwards;
        }

        .fade-out{
            animation: fadeOut 1.5s forwards;
        }

        @keyframes aparecer{
            from{
                opacity: 0;
            }

            to{
                opacity: 1;
            }
        }

        @keyframes fadeOut{
            from{
                opacity: 1;
            }

            to{
                opacity: 0;
            }
        }

        @keyframes introLogo{
            0%{
                transform: scale(1);
                opacity: 1;
            }

            25%{
                transform: scale(0.9);
            }

            60%{
                transform: scale(1.3);
            }

            100%{
                transform: scale(6);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <video autoplay muted loop playsinline class="bg-video">
        <source src="./video/background-poirier.webm" type="video/webm">
    </video>

    <div class="container">

        <h1 id="texto">
            BEM-VINDO AO <span>UFC CHAMPIONS</span>
        </h1>

        <img
            src="./images/logo-site-png.png"
            alt="Logo UFC Champions"
            class="logo"
            id="logo">

    </div>

    <script>

        const logo = document.getElementById("logo");
        const texto = document.getElementById("texto");

        window.addEventListener("load", () => {

            setTimeout(() => {

                texto.classList.add("fade-out");
                logo.classList.add("animar");

            }, 1000);

            setTimeout(() => {

                window.location.href = "pages/inicio.html";

            }, 3000);

        });

    </script>

</body>

</html>
