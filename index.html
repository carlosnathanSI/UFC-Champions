<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFC Champions</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
            border: none;
            text-decoration: none;
            text-transform: capitalize;
            transition: 0.2s linear;
            font-family: "Lato", sans-serif;
        }


        body {
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        h1 {
            color: #fff;
            font-size: 1rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .logo {
            width: 350px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.1);
        }

        .animar {
            animation: entrar 2s forwards;
        }

        .fade-out {
            animation: fadeOut 2s forwards;
        }

        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            opacity: 0.07;
        }

        span {
            color: #d1b420;
        }

        @keyframes entrar {

            0% {
                transform: scale(1);
            }

            15% {
                transform: scale(0.9);
            }

            40% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
                opacity: 0;
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }
    </style>

</head>

<body>
    <video autoplay muted loop playsinline preload="metadata" poster="thumb.jpg" class="bg-video">
        <source src="./video/background-poirier.webm" type="video/webm">
    </video>
    <div class="container">
        <h1 id="texto">BEM-VINDO AO <span>UFC CHAMPIONS</span></h1>
        <img src="./images/logo-site-png.png" alt="Logo UFC" class="logo" id="logo">
    </div>


    <script>
        const logo = document.getElementById("logo");
        const texto = document.getElementById("texto");

        logo.addEventListener("click", () => {

            texto.classList.add("fade-out");
            logo.classList.add("animar");

            setTimeout(() => {
                window.location.href = "pages/inicio.html";
            }, 2000);

        });
    </script>

</body>

</html>
